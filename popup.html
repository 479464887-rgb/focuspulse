<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;--green:#3fb950;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);width:300px;font-family:-apple-system,sans-serif;font-size:13px;text-align:center;}
.header{background:var(--surface);padding:12px;border-bottom:1px solid var(--border);}
.header h1{font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
.timer{padding:24px;position:relative;}
.time{font-size:56px;font-weight:700;color:#f0f6fc;font-variant-numeric:tabular-nums;}
.mode{font-size:12px;color:var(--text);margin-top:4px;text-transform:uppercase;letter-spacing:2px;}
.controls{display:flex;gap:8px;justify-content:center;padding:0 24px 16px;}
.btn{padding:8px 20px;border-radius:20px;border:none;font-size:13px;cursor:pointer;font-weight:500;}
.btn-primary{background:#238636;color:#fff;}
.btn-primary:hover{background:#2ea043;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:#30363d;}
.stats{display:flex;justify-content:center;gap:24px;padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-secondary);}
.stat-num{font-size:16px;font-weight:600;color:var(--accent);}
.settings{padding:12px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:center;}
.settings input{width:50px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);text-align:center;}
</style></head><body>
<div class="header"><h1>🍅 FocusPulse</h1></div>
<div class="timer">
  <div class="time" id="time">25:00</div>
  <div class="mode" id="mode">Focus</div>
</div>
<div class="controls">
  <button class="btn btn-primary" id="start-btn">Start</button>
  <button class="btn btn-secondary" id="stop-btn">Reset</button>
</div>
<div class="stats">
  <div><div class="stat-num" id="today-min">0</div>min today</div>
  <div><div class="stat-num" id="sessions">0</div>sessions</div>
</div>
<div class="settings">
  <span style="color:var(--text-secondary);">Focus</span>
  <input type="number" id="focus-dur" value="25" min="1" max="90">min
  <span style="color:var(--text-secondary);">Break</span>
  <input type="number" id="break-dur" value="5" min="1" max="30">min
</div>
<script src="popup.js"></script>
</body></html>
